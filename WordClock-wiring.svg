<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 880" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- WordClock-MD wiring diagram. Red = +5V, Dark = GND, Green = DATA. -->
  <rect x="0" y="0" width="1040" height="880" fill="#ffffff"/>

  <style>
    .box   { fill:#f5f7fa; stroke:#33404f; stroke-width:2; }
    .chip  { fill:#eef1f6; stroke:#33404f; stroke-width:2; }
    .lbl   { fill:#1f2933; font-size:15px; }
    .lblb  { fill:#1f2933; font-size:16px; font-weight:700; }
    .sm    { fill:#4a5568; font-size:12px; }
    .pin   { fill:#1f2933; font-size:12px; font-weight:600; }
    .p5    { stroke:#d92b2b; stroke-width:4; fill:none; }
    .gnd   { stroke:#1f2933; stroke-width:4; fill:none; }
    .dat   { stroke:#1f9d55; stroke-width:3.5; fill:none; }
    .rail5 { stroke:#d92b2b; stroke-width:6; fill:none; }
    .railg { stroke:#1f2933; stroke-width:6; fill:none; }
    .dot5  { fill:#d92b2b; }
    .dotg  { fill:#1f2933; }
    .dotd  { fill:#1f9d55; }
  </style>

  <text x="40" y="34" class="lblb" font-size="22">WordClock-MD — wiring</text>
  <text x="40" y="56" class="sm">ESP32-S3 SuperMini · 132× WS2812B (11×12 serpentine) · external 5V/3A</text>

  <!-- legend -->
  <g>
    <rect x="716" y="20" width="292" height="132" rx="8" class="box"/>
    <line x1="732" y1="48" x2="768" y2="48" class="p5"/>   <text x="780" y="53" class="lbl">+5 V</text>
    <line x1="732" y1="74" x2="768" y2="74" class="gnd"/>  <text x="780" y="79" class="lbl">GND (common)</text>
    <line x1="732" y1="100" x2="768" y2="100" class="dat"/><text x="780" y="105" class="lbl">DATA (3.3 V direct)</text>
    <line x1="732" y1="116" x2="992" y2="116" stroke="#d5dbe4" stroke-width="1"/>
    <circle cx="738" cy="134" r="4" class="dotg"/>
    <text x="750" y="139" class="sm">joined · a crossing without a dot is not joined</text>
  </g>

  <!-- ================= POWER SUPPLY ================= -->
  <rect x="64" y="70" width="180" height="80" rx="8" class="box"/>
  <text x="154" y="104" text-anchor="middle" class="lblb">5 V ⎓ 3 A</text>
  <text x="154" y="126" text-anchor="middle" class="lbl">Power supply</text>
  <text x="100" y="170" text-anchor="end" class="pin" fill="#d92b2b">+5V</text>
  <text x="210" y="170" text-anchor="start" class="pin">GND</text>

  <!-- fuse -->
  <rect x="100" y="176" width="24" height="26" rx="3" class="chip"/>
  <text x="132" y="194" text-anchor="start" class="sm">3–3.5 A fuse</text>

  <!-- ================= RAILS ================= -->
  <line x1="64"  y1="230" x2="980" y2="230" class="rail5"/>
  <line x1="64"  y1="272" x2="980" y2="272" class="railg"/>
  <text x="64" y="222" class="sm" fill="#d92b2b">+5 V rail</text>
  <text x="64" y="290" class="sm">GND rail</text>

  <!-- PSU -> rails -->
  <path class="p5"  d="M112,150 V176 M112,202 V230"/>
  <circle cx="112" cy="230" r="4" class="dot5"/>
  <path class="gnd" d="M198,150 V272"/>
  <circle cx="198" cy="272" r="4" class="dotg"/>

  <!-- ================= ESP32-S3 BOARD ================= -->
  <rect x="420" y="330" width="220" height="128" rx="10" class="box"/>
  <text x="530" y="372" text-anchor="middle" class="lblb">ESP32-S3</text>
  <text x="530" y="392" text-anchor="middle" class="lbl">SuperMini (HW-747)</text>
  <circle cx="460" cy="330" r="4" class="dotg"/> <text x="450" y="352" text-anchor="middle" class="pin">5V</text>
  <circle cx="600" cy="330" r="4" class="dotg"/> <text x="600" y="352" text-anchor="middle" class="pin">GND</text>
  <circle cx="460" cy="458" r="4" class="dotd"/> <text x="474" y="446" text-anchor="start" class="pin">GPIO1 (data)</text>

  <!-- right-side notes (clear of wiring) -->
  <text x="1004" y="428" text-anchor="end" class="sm">GPIO48 → onboard status LED</text>
  <text x="1004" y="446" text-anchor="end" class="sm">(no external wiring)</text>
  <text x="1004" y="470" text-anchor="end" class="sm">board sips ~0.3 A via its 5V pin</text>

  <!-- rails -> board -->
  <path class="p5"  d="M460,230 V330"/> <circle cx="460" cy="230" r="4" class="dot5"/>
  <path class="gnd" d="M600,272 V330"/> <circle cx="600" cy="272" r="4" class="dotg"/>

  <!-- ================= DATA: GPIO1 -> 330 Ω -> strip DIN (DIRECT, no level shifter) ================= -->
  <path class="dat" d="M460,458 V672 H120 V732"/>
  <rect x="447" y="492" width="26" height="22" rx="3" class="chip"/>
  <text x="440" y="508" text-anchor="end" class="sm">330 Ω</text>

  <!-- optional level-shifter note (NOT used in the reference build) -->
  <rect x="486" y="556" width="360" height="76" rx="8" class="chip" stroke-dasharray="5 4"/>
  <text x="500" y="580" class="sm">Direct 3.3 V data drives the strip fine over a short lead —</text>
  <text x="500" y="598" class="sm">the first WS2812 re-shapes the signal. A 74AHCT125 buffer</text>
  <text x="500" y="616" class="sm">is an OPTIONAL fallback only for a long data run.</text>

  <!-- ================= LED STRIP ================= -->
  <rect x="64" y="732" width="912" height="72" rx="8" class="box"/>
  <text x="520" y="762" text-anchor="middle" class="lblb">WS2812B strip — 132 LEDs</text>
  <text x="520" y="784" text-anchor="middle" class="sm">11 rows × 12, serpentine · inject +5V/GND at BOTH ends</text>
  <text x="120" y="726" text-anchor="middle" class="pin" fill="#1f9d55">DIN ◄</text>
  <text x="930" y="726" text-anchor="middle" class="pin">DOUT ►</text>
  <circle cx="120" cy="732" r="4" class="dotd"/>

  <!-- power injection: left end -->
  <path class="p5"  d="M150,230 V732"/> <circle cx="150" cy="230" r="4" class="dot5"/> <circle cx="150" cy="732" r="4" class="dot5"/>
  <path class="gnd" d="M186,272 V732"/> <circle cx="186" cy="272" r="4" class="dotg"/> <circle cx="186" cy="732" r="4" class="dotg"/>
  <!-- power injection: right end -->
  <path class="p5"  d="M900,230 V732"/> <circle cx="900" cy="230" r="4" class="dot5"/> <circle cx="900" cy="732" r="4" class="dot5"/>
  <path class="gnd" d="M864,272 V732"/> <circle cx="864" cy="272" r="4" class="dotg"/> <circle cx="864" cy="732" r="4" class="dotg"/>

  <!-- bulk cap between left +5V and GND -->
  <path class="p5"  d="M150,690 H236"/>
  <path class="gnd" d="M186,704 H236"/>
  <line x1="236" y1="682" x2="236" y2="698" stroke="#d92b2b" stroke-width="3"/>
  <line x1="248" y1="678" x2="248" y2="702" stroke="#1f2933" stroke-width="3"/>
  <circle cx="150" cy="690" r="4" class="dot5"/>
  <circle cx="186" cy="704" r="4" class="dotg"/>
  <text x="262" y="694" class="sm">≈940 µF (2×470)</text>

  <!-- footer -->
  <text x="40" y="852" class="sm">★ Common ground everywhere. Never power the board from USB-C and the 5 V supply at the same time — use OTA after the first flash.</text>
</svg>
